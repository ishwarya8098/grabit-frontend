<!DOCTYPE html>
<html>
<head>
    <title>Grabit - Browse</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        h1 { color: purple; }
        #items-container { display:flex; flex-wrap:wrap; }
        .item-card { border:1px solid #ddd; padding:15px; margin:10px; border-radius:8px; width:250px; background:white; }
        .item-card img { width:100%; height:150px; object-fit:cover; border-radius:5px; }
        button { background:purple; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer; width:100%; }
        #cart { position:fixed; right:20px; top:80px; border:1px solid #ccc; padding:15px; width:220px; background:white; border-radius:8px; }
    </style>
</head>
<body>
    <h1>Grabit - Browse Items</h1>
    <div id="items-container"></div>
    
    <div id="cart">
        <h3>🛒 Cart</h3>
        <div id="cart-items"><p>Cart empty</p></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
