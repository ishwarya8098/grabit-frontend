<!DOCTYPE html>
<html>
<head>
    <title>Grabit - Browse Items</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        h1 { color: purple; }
        .item-card { border:1px solid #ddd; padding:15px; margin:10px; border-radius:8px; width:250px; display:inline-block; vertical-align:top; background:white; }
        .item-card img { width:100%; height:150px; object-fit:cover; border-radius:5px; }
        button { background:purple; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; }
        button:hover { background:darkviolet; }
        #cart { position:fixed; right:20px; top:100px; border:1px solid #ccc; padding:15px; width:200px; background:white; border-radius:8px; }
    </style>
</head>
<body>
    <h1>Grabit - Rent Anything, Own Nothing</h1>
    <h2>Browse Items</h2>
    
    <div id="items-container"></div>
    
    <div id="cart">
        <h3>Your Cart</h3>
        <div id="cart-items"><p>Cart empty</p></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
