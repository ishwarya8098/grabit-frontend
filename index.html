<!DOCTYPE html>
<html>
<head>
    <title>Grabit - Rent Items</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        h1 { color: purple; text-align:center; }
        #items-container { display:flex; flex-wrap:wrap; justify-content:center; }
        .item-card { border:1px solid #ddd; padding:15px; margin:10px; border-radius:8px; width:250px; background:white; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
        .item-card img { width:100%; height:150px; object-fit:cover; border-radius:5px; }
        button { background:purple; color:white; border:none; padding:10px 15px; border-radius:5px; cursor:pointer; width:100%; }
        button:hover { background:darkviolet; }
        #cart { position:fixed; right:20px; top:80px; border:1px solid #ccc; padding:15px; width:220px; background:white; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <h1>Grabit - Rent Anything, Own Nothing</h1>
    
    <div id="items-container">Loading...</div>
    
    <div id="cart">
        <h3>🛒 Your Cart</h3>
        <div id="cart-items"><p>Cart empty</p></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
